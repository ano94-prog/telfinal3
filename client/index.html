<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="robots" content="noindex, nofollow" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Secure authentication portal with two-factor SMS verification. Access your rewards account to manage points and redeem exclusive offers." />
    <meta name="theme-color" content="#0d54ff" />
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Secure Login Portal - Rewards Account Access" />
    <meta property="og:description" content="Sign in securely to access your rewards account, manage points, and redeem exclusive offers." />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Secure Login Portal" />
    <meta name="twitter:description" content="Access your rewards account securely with two-factor authentication." />
    
    <title>Secure Login Portal - Rewards Account Access</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- Optimized Font Loading - Only Inter (performance improvement: ~700KB saved) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Telstra Brand Fonts -->
    <link rel="stylesheet" href="/telstra-fonts.css">
    <link rel="stylesheet" href="/telstra-able.min.css">
    <link rel="stylesheet" href="/cnsb-custom.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
